version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chainvault-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chainvault
    ports:
      - '5432:5432'
    volumes:
      - chainvault_pgdata:/var/lib/postgresql/data

volumes:
  chainvault_pgdata:
